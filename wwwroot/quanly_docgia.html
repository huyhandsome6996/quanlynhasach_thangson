<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Độc giả - Thư viện</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="img/logo.png" alt="Logo">
                <div><h2>THƯ VIỆN</h2><span>Hệ thống quản lý</span></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Tổng quan</div>
                <a href="index.html" class="nav-item"><span class="icon">📊</span> Trang chủ</a>
                <div class="nav-section-title">Quản lý</div>
                <a href="quanly_sach.html" class="nav-item"><span class="icon">📚</span> Quản lý Sách</a>
                <a href="quanly_theloai.html" class="nav-item"><span class="icon">🏷️</span> Quản lý Thể loại</a>
                <a href="quanly_docgia.html" class="nav-item active"><span class="icon">👤</span> Quản lý Độc giả</a>
                <div class="nav-section-title">Nghiệp vụ</div>
                <a href="quanly_muontra.html" class="nav-item"><span class="icon">🔄</span> Mượn / Trả sách</a>
            </nav>
            <div class="sidebar-footer">
                <a class="nav-item" onclick="dangXuat()"><span class="icon">🚪</span> Đăng xuất</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>👤 Quản lý Độc giả</h1>
                    <p>Quản lý thông tin và thẻ thành viên độc giả</p>
                </div>
                <button class="btn btn-primary" onclick="moFormThem()">➕ Thêm độc giả</button>
            </div>

            <div class="card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Mã ĐG</th>
                                <th>Họ tên</th>
                                <th>CCCD</th>
                                <th>SĐT</th>
                                <th>Email</th>
                                <th>Ngày ĐK</th>
                                <th>Hết hạn</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyDocGia"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalDocGia">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">➕ Thêm độc giả</h3>
                <button class="modal-close" onclick="dongModal()">✕</button>
            </div>
            <form onsubmit="return luuDocGia(event)">
                <div class="form-group">
                    <label for="txtMaDG">Mã độc giả</label>
                    <input type="text" id="txtMaDG" class="form-control" placeholder="Tự động tạo" disabled>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="txtTenDG">Họ và tên</label>
                        <input type="text" id="txtTenDG" class="form-control" placeholder="Nhập họ tên" required>
                    </div>
                    <div class="form-group">
                        <label for="txtCCCD">Căn cước công dân</label>
                        <input type="text" id="txtCCCD" class="form-control" placeholder="Nhập CCCD">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="txtSdt">Số điện thoại</label>
                        <input type="tel" id="txtSdt" class="form-control" placeholder="Nhập SĐT" required>
                    </div>
                    <div class="form-group">
                        <label for="txtEmail">Email</label>
                        <input type="email" id="txtEmail" class="form-control" placeholder="Nhập email">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" onclick="dongModal()">Hủy</button>
                    <button type="submit" id="btnLuuDG" class="btn btn-primary">💾 Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API = 'http://localhost:5100/api';
        let editingMa = null;

        if (!localStorage.getItem('user')) window.location.href = 'login.html';
        function dangXuat() { localStorage.removeItem('user'); window.location.href = 'login.html'; }

        function showToast(msg, type='success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function getBadge(tt) {
            if (tt === 'Hoạt động') return '<span class="badge badge-success">Hoạt động</span>';
            if (tt === 'Hết hạn') return '<span class="badge badge-warning">Hết hạn</span>';
            return '<span class="badge badge-danger">Bị khóa</span>';
        }

        async function loadData() {
            try {
                const data = await fetch(`${API}/docgia`).then(r => r.json());
                const tbody = document.getElementById('tbodyDocGia');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text-muted);padding:32px;">Không có dữ liệu</td></tr>';
                    return;
                }
                data.forEach(dg => {
                    tbody.innerHTML += `<tr>
                        <td><strong>${dg.maDG}</strong></td>
                        <td>${dg.tenDG}</td>
                        <td>${dg.cccd}</td>
                        <td>${dg.soDienThoai}</td>
                        <td>${dg.email}</td>
                        <td>${dg.ngayDangKy}</td>
                        <td>${dg.ngayHetHan}</td>
                        <td>${getBadge(dg.trangThai)}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-warning btn-sm" onclick="suaDocGia('${dg.maDG}')">✏️</button>
                                <button class="btn btn-danger btn-sm" onclick="xoaDocGia('${dg.maDG}')">🗑️</button>
                            </div>
                        </td>
                    </tr>`;
                });
            } catch(e) { console.error(e); }
        }

        function moFormThem() {
            editingMa = null;
            document.getElementById('modalTitle').textContent = '➕ Thêm độc giả';
            document.getElementById('txtMaDG').value = '';
            document.getElementById('txtTenDG').value = '';
            document.getElementById('txtCCCD').value = '';
            document.getElementById('txtSdt').value = '';
            document.getElementById('txtEmail').value = '';
            document.getElementById('modalDocGia').classList.add('active');
        }

        async function suaDocGia(ma) {
            try {
                const data = await fetch(`${API}/docgia`).then(r => r.json());
                const dg = data.find(x => x.maDG === ma);
                if (!dg) return;
                editingMa = ma;
                document.getElementById('modalTitle').textContent = '✏️ Sửa độc giả';
                document.getElementById('txtMaDG').value = dg.maDG;
                document.getElementById('txtTenDG').value = dg.tenDG;
                document.getElementById('txtCCCD').value = dg.cccd;
                document.getElementById('txtSdt').value = dg.soDienThoai;
                document.getElementById('txtEmail').value = dg.email;
                document.getElementById('modalDocGia').classList.add('active');
            } catch(e) { console.error(e); }
        }

        async function luuDocGia(e) {
            e.preventDefault();
            const body = {
                tenDG: document.getElementById('txtTenDG').value,
                cccd: document.getElementById('txtCCCD').value,
                soDienThoai: document.getElementById('txtSdt').value,
                email: document.getElementById('txtEmail').value
            };
            try {
                let res;
                if (editingMa) {
                    res = await fetch(`${API}/docgia/${editingMa}`, {
                        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
                    });
                } else {
                    res = await fetch(`${API}/docgia`, {
                        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
                    });
                }
                const data = await res.json();
                showToast(data.message, data.success?'success':'error');
                if (data.success) { dongModal(); loadData(); }
            } catch(e) { showToast('Lỗi kết nối!','error'); }
        }

        async function xoaDocGia(ma) {
            if (!confirm('Bạn có chắc muốn xóa độc giả này?')) return;
            try {
                const res = await fetch(`${API}/docgia/${ma}`, { method:'DELETE' });
                const data = await res.json();
                showToast(data.message, data.success?'success':'error');
                if (data.success) loadData();
            } catch(e) { showToast('Lỗi kết nối!','error'); }
        }

        function dongModal() { document.getElementById('modalDocGia').classList.remove('active'); }

        loadData();
    </script>
</body>
</html>
